syntax = "proto3";

package product;

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (ProductResponse);
  rpc ListProducts(Empty) returns (ProductListResponse);
  rpc GetProductById(ProductByIdRequest) returns (ProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (ProductResponse);
}

message Empty {}

message ProductByIdRequest {
  int32 id = 1;
}

message DeleteProductRequest {
  int32 id = 1;
}

message CreateProductRequest {
  int32 platform_category_id = 1;
  int32 category_id = 2;
  int32 sub_category_id = 3;

  string name = 4;
  string slug = 5;
  string description = 6;

  double price = 7;
  double discount_price = 8;
  double discount_percentage = 9;

  bool in_stock = 10;
  string brand = 11;
  bool is_active = 12;

  repeated string images = 13;

  double quantity = 14;
}

message UpdateProductRequest {
  int32 id = 1;

  int32 platform_category_id = 2;
  int32 category_id = 3;
  int32 sub_category_id = 4;

  string name = 5;
  string slug = 6;
  string description = 7;

  double price = 8;
  double discount_price = 9;
  double discount_percentage = 10;

  bool in_stock = 11;
  string brand = 12;
  bool is_active = 13;

  repeated string images = 14;

  double quantity = 15;
}

message Product {
  int32 id = 1;

  int32 platform_category_id = 2;
  int32 category_id = 3;
  int32 sub_category_id = 4;

  string name = 5;
  string slug = 6;
  string description = 7;

  double price = 8;
  double discount_price = 9;
  double discount_percentage = 10;

  bool in_stock = 11;
  string brand = 12;
  bool is_active = 13;

  repeated string images = 14;

  double quantity = 15;
}

message ProductResponse {
  bool status = 1;
  string message = 2;
  Product data = 3;
}

message ProductListResponse {
  bool status = 1;
  string message = 2;
  repeated Product data = 3;
}